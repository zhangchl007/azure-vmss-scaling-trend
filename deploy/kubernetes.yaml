apiVersion: v1
kind: ServiceAccount
metadata:
  name: workidentity-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: bc4d548a-d6ed-46ab-88bb-24574de23c46
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmss-metrics-exporter
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmss-metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmss-metrics-exporter
    spec:
      serviceAccountName: default
      containers:
        - name: exporter
          image: zhangchl007/vmss-metrics-exporter:v7
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8000
          env:
            - name: AZURE_SUBSCRIPTION_IDS
              value: "f3814144-0548-467b-8edd-5c4777b44d10"
            # Choose authentication mode. Supported values:
            #   workload_identity  - use AKS Workload Identity webhook injection
            #   service_principal  - use AZURE_CLIENT_ID/TENANT_ID/CLIENT_SECRET from Secret (active)
            #   auto               - SP if SP env complete, else WI, else DAC fallback
            - name: VMSS_METRICS_AUTH_MODE
              value: "service_principal"
            # ------------------------------------------------------------------
            # Service Principal credentials sourced from Kubernetes Secret
            # `vmss-metrics-exporter-sp` (keys: AZURE_TENANT_ID, AZURE_CLIENT_ID,
            # AZURE_CLIENT_SECRET). Create the Secret with:
            #   kubectl create secret generic vmss-metrics-exporter-sp \
            #     --from-literal=AZURE_TENANT_ID=... \
            #     --from-literal=AZURE_CLIENT_ID=... \
            #     --from-literal=AZURE_CLIENT_SECRET=...
            # ------------------------------------------------------------------
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: vmss-metrics-exporter-sp
                  key: AZURE_TENANT_ID
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: vmss-metrics-exporter-sp
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vmss-metrics-exporter-sp
                  key: AZURE_CLIENT_SECRET
            # ------------------------------------------------------------------
            # To switch back to Workload Identity:
            #   1. Restore ServiceAccount `workidentity-sa` (annotated with the WI
            #      federated client-id) at the top of this manifest.
            #   2. Set `serviceAccountName: workidentity-sa` above.
            #   3. Add label `azure.workload.identity/use: "true"` to both the
            #      Deployment metadata.labels and spec.template.metadata.labels.
            #   4. Set VMSS_METRICS_AUTH_MODE above to "workload_identity".
            #   5. Remove the three AZURE_* secretKeyRef env entries above.
            # ------------------------------------------------------------------
            - name: POLL_INTERVAL_SECONDS
              value: "300"
            - name: PORT
              value: "8000"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: vmss-metrics-exporter
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
spec:
  selector:
    app.kubernetes.io/name: vmss-metrics-exporter
  ports:
    - name: metrics
      port: 8000
      targetPort: metrics

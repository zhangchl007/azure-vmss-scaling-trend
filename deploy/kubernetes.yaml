# ------------------------------------------------------------------
# Workload-Identity ServiceAccount (kept for reference). Currently
# unused — the Deployment below runs as the dedicated
# `vmss-metrics-exporter` ServiceAccount and authenticates to Azure
# via the `vmss-metrics-exporter-sp` Secret. To switch back to WI:
#   1. Set `serviceAccountName: workidentity-sa` in the Deployment.
#   2. Re-add `azure.workload.identity/use: "true"` label on both
#      Deployment.metadata.labels and template.metadata.labels.
#   3. Set VMSS_METRICS_AUTH_MODE=workload_identity and remove the
#      three AZURE_* secretKeyRef env entries.
# ------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workidentity-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: bc4d548a-d6ed-46ab-88bb-24574de23c46
---
# Dedicated ServiceAccount used by the exporter pods. RBAC below
# grants the access needed for the kubernetes.leaderelection
# ConfigMapLock to read/update its lock annotation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmss-metrics-exporter
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vmss-metrics-exporter-leader-election
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
rules:
  # ConfigMapLock from kubernetes.leaderelection stores the holder
  # identity inside an annotation on a single ConfigMap whose name
  # matches LEADER_ELECTION_LOCK_NAME below.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vmss-metrics-exporter-leader-election
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vmss-metrics-exporter-leader-election
subjects:
  - kind: ServiceAccount
    name: vmss-metrics-exporter
    namespace: default
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vmss-metrics-exporter
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
spec:
  # Keep at least one collector replica scheduled during voluntary
  # disruptions (node drains, cluster autoscaler) so the lock never
  # transitions through an empty period longer than the lease.
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmss-metrics-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmss-metrics-exporter
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Keep at least one active replica during rollout. The new pod
      # waits as a follower until it acquires the lock from the
      # outgoing leader.
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: vmss-metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmss-metrics-exporter
    spec:
      serviceAccountName: vmss-metrics-exporter
      terminationGracePeriodSeconds: 30
      affinity:
        # Prefer to spread replicas across nodes for HA; do not require
        # it so the deployment still schedules on single-node clusters.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: vmss-metrics-exporter
      containers:
        - name: exporter
          image: zhangchl007/vmss-metrics-exporter:v13
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8000
          env:
            - name: AZURE_SUBSCRIPTION_IDS
              value: "f3814144-0548-467b-8edd-5c4777b44d10"
            # Choose authentication mode. Supported values:
            #   workload_identity  - use AKS Workload Identity webhook injection
            #   service_principal  - use AZURE_CLIENT_ID/TENANT_ID/CLIENT_SECRET from Secret (active)
            #   auto               - SP if SP env complete, else WI, else DAC fallback
            - name: VMSS_METRICS_AUTH_MODE
              value: "service_principal"
            # ------------------------------------------------------------------
            # Service Principal credentials sourced from Kubernetes Secret
            # `vmss-metrics-exporter-sp` (keys: AZURE_TENANT_ID, AZURE_CLIENT_ID,
            # AZURE_CLIENT_SECRET). Create the Secret with:
            #   kubectl create secret generic vmss-metrics-exporter-sp \
            #     --from-literal=AZURE_TENANT_ID=... \
            #     --from-literal=AZURE_CLIENT_ID=... \
            #     --from-literal=AZURE_CLIENT_SECRET=...
            # ------------------------------------------------------------------
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: vmss-metrics-exporter-sp
                  key: AZURE_TENANT_ID
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: vmss-metrics-exporter-sp
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vmss-metrics-exporter-sp
                  key: AZURE_CLIENT_SECRET
            - name: POLL_INTERVAL_SECONDS
              value: "300"
            - name: PORT
              value: "8000"
            - name: LOG_LEVEL
              value: "INFO"
            - name: ENABLE_MANAGED_LUSTRE_METRICS
              value: "true"
            - name: LUSTRE_POLL_INTERVAL_SECONDS
              value: "60"
            - name: LUSTRE_METRICS_LOOKBACK_MINUTES
              value: "15"
            - name: LUSTRE_METRICS_INTERVAL
              value: "PT1M"
            - name: LUSTRE_METRICS_MAX_WORKERS
              value: "4"
            # ----- Leader election (active/standby HA) --------------------
            - name: LEADER_ELECTION_ENABLED
              value: "true"
            - name: LEADER_ELECTION_LOCK_NAME
              value: "vmss-metrics-exporter"
            - name: LEADER_ELECTION_LEASE_DURATION_SECONDS
              value: "15"
            - name: LEADER_ELECTION_RENEW_DEADLINE_SECONDS
              value: "10"
            - name: LEADER_ELECTION_RETRY_PERIOD_SECONDS
              value: "2"
            # Downward API: candidate identity = pod name, lock namespace = pod namespace.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: vmss-metrics-exporter
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
spec:
  selector:
    app.kubernetes.io/name: vmss-metrics-exporter
  ports:
    - name: metrics
      port: 8000
      targetPort: metrics

apiVersion: v1
kind: ServiceAccount
metadata:
  name: workidentity-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: bc4d548a-d6ed-46ab-88bb-24574de23c46
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmss-metrics-exporter
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
    azure.workload.identity/use: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmss-metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmss-metrics-exporter
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: workidentity-sa
      containers:
        - name: exporter
          image: zhangchl007/vmss-metrics-exporter:v5
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8000
          env:
            - name: AZURE_SUBSCRIPTION_IDS
              value: "f3814144-0548-467b-8edd-5c4777b44d10"
            # Choose authentication mode for Kubernetes deployments:
            # - workload_identity: use AKS Workload Identity webhook injection (default here)
            # - service_principal: use AZURE_CLIENT_ID/TENANT_ID/CLIENT_SECRET below
            # - auto: use SP when all SP env vars exist; otherwise WI/DAC fallback
            - name: VMSS_METRICS_AUTH_MODE
              value: "workload_identity"
            # To use Service Principal instead of Workload Identity:
            # 1. Create a Secret named vmss-metrics-exporter-sp with keys:
            #    AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_CLIENT_SECRET
            # 2. Change VMSS_METRICS_AUTH_MODE to "service_principal"
            # 3. Uncomment the three env entries below.
            # - name: AZURE_CLIENT_ID
            #   valueFrom:
            #     secretKeyRef:
            #       name: vmss-metrics-exporter-sp
            #       key: AZURE_CLIENT_ID
            # - name: AZURE_TENANT_ID
            #   valueFrom:
            #     secretKeyRef:
            #       name: vmss-metrics-exporter-sp
            #       key: AZURE_TENANT_ID
            # - name: AZURE_CLIENT_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: vmss-metrics-exporter-sp
            #       key: AZURE_CLIENT_SECRET
            - name: POLL_INTERVAL_SECONDS
              value: "300"
            - name: PORT
              value: "8000"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: vmss-metrics-exporter
  namespace: default
  labels:
    app.kubernetes.io/name: vmss-metrics-exporter
spec:
  selector:
    app.kubernetes.io/name: vmss-metrics-exporter
  ports:
    - name: metrics
      port: 8000
      targetPort: metrics

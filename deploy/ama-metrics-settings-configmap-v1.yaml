apiVersion: v1
kind: ConfigMap
metadata:
  name: ama-metrics-prometheus-config
  namespace: kube-system
data:
  prometheus-config: |-
    global:
      scrape_interval: 60s
    scrape_configs:
      - job_name: azure_metrics_vmss
        scheme: http
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Keep only vmss-metrics-exporter pods in the default namespace.
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: default
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: vmss-metrics-exporter
          # Keep only the container port named "metrics".
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics
          # Surface useful labels for PromQL.
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
